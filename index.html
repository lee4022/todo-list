<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>오늘의 할 일</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="container">

    <main class="main">
      <header class="card-header">
        <div class="card-header-text">
          <h1 class="card-title">TODO List</h1>
          <p class="card-sub">오늘 할 일을 정리해보세요.</p>
        </div>
        <div class="card-header-illust">
          <svg viewBox="0 0 160 140" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
            <!-- 배경 원형 글로우 -->
            <circle cx="112" cy="60" r="44" fill="rgba(255,255,255,0.08)"/>
            <circle cx="112" cy="60" r="30" fill="rgba(255,255,255,0.10)"/>

            <!-- 클립보드 본체 -->
            <rect x="34" y="22" width="80" height="96" rx="10" fill="rgba(255,255,255,0.18)" stroke="rgba(255,255,255,0.45)" stroke-width="1.5"/>

            <!-- 클립 -->
            <rect x="62" y="14" width="24" height="14" rx="7" fill="rgba(255,255,255,0.35)" stroke="rgba(255,255,255,0.6)" stroke-width="1.5"/>
            <rect x="68" y="17" width="12" height="8" rx="4" fill="rgba(255,255,255,0.55)"/>

            <!-- 할 일 줄 1 (완료) -->
            <rect x="52" y="44" width="46" height="7" rx="3.5" fill="rgba(255,255,255,0.20)"/>
            <circle cx="44" cy="47.5" r="6" fill="rgba(255,255,255,0.30)" stroke="rgba(255,255,255,0.7)" stroke-width="1.5"/>
            <!-- 체크 표시 -->
            <polyline points="41,47.5 43.5,50 47.5,44.5" stroke="white" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>

            <!-- 할 일 줄 2 (완료) -->
            <rect x="52" y="64" width="38" height="7" rx="3.5" fill="rgba(255,255,255,0.20)"/>
            <circle cx="44" cy="67.5" r="6" fill="rgba(255,255,255,0.30)" stroke="rgba(255,255,255,0.7)" stroke-width="1.5"/>
            <polyline points="41,67.5 43.5,70 47.5,64.5" stroke="white" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>

            <!-- 할 일 줄 3 (진행중) -->
            <rect x="52" y="84" width="52" height="7" rx="3.5" fill="rgba(255,255,255,0.20)"/>
            <circle cx="44" cy="87.5" r="6" fill="transparent" stroke="rgba(255,255,255,0.6)" stroke-width="1.5"/>

            <!-- 할 일 줄 4 (진행중) -->
            <rect x="52" y="101" width="30" height="7" rx="3.5" fill="rgba(255,255,255,0.13)"/>
            <circle cx="44" cy="104.5" r="6" fill="transparent" stroke="rgba(255,255,255,0.4)" stroke-width="1.5"/>

            <!-- 우측 장식 별/스파클 -->
            <circle cx="130" cy="25" r="3" fill="rgba(255,255,255,0.6)"/>
            <circle cx="142" cy="44" r="2" fill="rgba(255,255,255,0.4)"/>
            <circle cx="124" cy="100" r="2.5" fill="rgba(255,255,255,0.35)"/>

            <!-- 연필 -->
            <g transform="translate(100,85) rotate(-35)">
              <rect x="-4" y="-22" width="8" height="28" rx="2" fill="rgba(255,255,255,0.5)" stroke="rgba(255,255,255,0.7)" stroke-width="1"/>
              <polygon points="-4,6 4,6 0,14" fill="rgba(255,220,150,0.85)"/>
              <rect x="-4" y="-26" width="8" height="6" rx="1" fill="rgba(255,180,180,0.7)"/>
              <line x1="0" y1="10" x2="0" y2="14" stroke="rgba(60,40,20,0.5)" stroke-width="1"/>
            </g>
          </svg>
        </div>
      </header>
      <section class="input-section">
        <div class="input-row">
          <input type="text" id="todoInput" class="todo-input" placeholder="할 일을 입력하세요...">
          <button id="addBtn" class="add-btn">추가</button>
        </div>
        <div class="input-options">
          <button id="descToggleBtn" class="desc-toggle-btn">+ 설명</button>
          <select id="groupSelect" class="group-select"></select>
        </div>
        <textarea id="descInput" class="desc-textarea" placeholder="설명을 입력하세요..."></textarea>
      </section>

      <section class="todo-section">
        <div class="group-tabs" id="groupTabs">
          <button class="group-tab active" data-group="all">전체</button>
          <button class="add-group-btn" id="addGroupBtn" title="그룹 추가">+</button>
        </div>
        <div class="group-add-form" id="groupAddForm">
          <input type="text" id="groupNameInput" class="group-name-input" placeholder="그룹 이름 입력...">
          <button id="confirmGroupBtn" class="confirm-group-btn">추가</button>
          <button id="cancelGroupBtn" class="cancel-group-btn">취소</button>
        </div>
        <div class="tabs">
          <button class="tab active" data-filter="all">
            전체 <span class="badge" id="allCount">0</span>
          </button>
          <button class="tab" data-filter="active">
            진행중 <span class="badge" id="activeCount">0</span>
          </button>
          <button class="tab" data-filter="completed">
            완료 <span class="badge" id="completedCount">0</span>
          </button>
        </div>

        <ul id="todoList" class="todo-list"></ul>

        <div id="emptyState" class="empty-state">
          <div class="empty-icon">📋</div>
          <p>할 일이 없습니다</p>
          <span>새로운 할 일을 추가해보세요!</span>
        </div>
      </section>

      <footer id="todoFooter" class="todo-footer" style="display:none;">
        <span id="remainingText" class="remaining-text"></span>
        <button id="clearCompletedBtn" class="clear-btn">완료 항목 삭제</button>
      </footer>
    </main>

  </div>

  <script src="app.js"></script>
</body>
</html>
